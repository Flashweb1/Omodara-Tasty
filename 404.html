<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | OMODARA TASTY</title>
    <meta name="description" content="Page not found. Return to OMODARA TASTY homepage.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Poppins:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="./img/logo-icon.png">
    <style>
        .error-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; background: linear-gradient(135deg, var(--luxury-black), var(--dark-brown)); }
        .error-code { font-family: 'Playfair Display', serif; font-size: 120px; font-weight: 800; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 10px; }
        .error-title { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 15px; }
        .error-text { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 30px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .error-actions { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    </style>
</head>

<body>
    <div class="error-page">
        <div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-text">Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
                <a href="menu.html" class="btn btn-outline"><i class="fas fa-utensils"></i> View Menu</a>
                <a href="contact.html" class="btn btn-outline"><i class="fas fa-envelope"></i> Contact Us</a>
            </div>
        </div>
    </div>
</body>
</html>
